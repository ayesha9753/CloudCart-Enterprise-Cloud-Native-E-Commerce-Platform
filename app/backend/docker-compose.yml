services:
  backend:
    build: .
    container_name: cloudcart-backend

    ports:
      - "8000:8000"

    volumes:
      - .:/app

    depends_on:
      - db

    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/cloudcart
      SECRET_KEY: cloudcart-secret-key-2026
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30

    restart: unless-stopped

  db:
    image: postgres:16

    container_name: cloudcart-db

    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cloudcart

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  prometheus:
    image: prom/prometheus:latest

    container_name: cloudcart-prometheus

    restart: unless-stopped

    ports:
      - "9090:9090"

    volumes:
      - ../../monitoring/prometheus.yml:/etc/prometheus/prometheus.yml

    command:
      - "--config.file=/etc/prometheus/prometheus.yml"

    depends_on:
      - backend

  grafana:
    image: grafana/grafana:latest

    container_name: cloudcart-grafana

    restart: unless-stopped

    ports:
      - "3000:3000"

    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin

    depends_on:
      - prometheus

    volumes:
      - grafana_data:/var/lib/grafana

volumes:
  postgres_data:
  grafana_data: