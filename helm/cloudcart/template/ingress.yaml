apiVersion: networking.k8s.io/v1
kind: Ingress

metadata:
  name: cloudcart-ingress

spec:
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: cloudcart-service
                port:
                  number: {{ .Values.service.port }}